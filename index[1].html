<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>عبد المؤمن | KEITH</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100%;font-family:'Tajawal',sans-serif;background:#040a14;overflow-x:hidden}

    /* ══ KEYFRAMES ══ */
    @keyframes twinkle{
      0%,100%{opacity:.1;transform:scale(1)}
      50%{opacity:1;transform:scale(1.6)}
    }
    @keyframes rise{
      0%{transform:translateY(0) translateX(0);opacity:0}
      10%{opacity:.9}
      90%{opacity:.4}
      100%{transform:translateY(-100vh) translateX(var(--drift,0px));opacity:0}
    }
    @keyframes blob1{
      0%{transform:translate(0,0) scale(1)}
      33%{transform:translate(12vw,8vh) scale(1.15)}
      66%{transform:translate(-5vw,15vh) scale(0.95)}
      100%{transform:translate(0,0) scale(1)}
    }
    @keyframes blob2{
      0%{transform:translate(0,0) scale(1)}
      33%{transform:translate(-10vw,-6vh) scale(1.2)}
      66%{transform:translate(8vw,-12vh) scale(0.9)}
      100%{transform:translate(0,0) scale(1)}
    }
    @keyframes blob3{
      0%{transform:translate(0,0) scale(1)}
      50%{transform:translate(6vw,10vh) scale(1.3)}
      100%{transform:translate(0,0) scale(1)}
    }
    @keyframes blob4{
      0%{transform:translate(0,0) scale(1)}
      50%{transform:translate(-8vw,8vh) scale(1.1)}
      100%{transform:translate(0,0) scale(1)}
    }
    @keyframes shoot{
      0%{opacity:0;transform:translateX(-80px) translateY(0) rotate(-25deg);width:0}
      5%{opacity:1;width:120px}
      40%{opacity:0;transform:translateX(400px) translateY(80px) rotate(-25deg);width:40px}
      100%{opacity:0}
    }
    @keyframes shoot2{
      0%{opacity:0;transform:translateX(-60px) translateY(0) rotate(-18deg);width:0}
      5%{opacity:1;width:90px}
      35%{opacity:0;transform:translateX(350px) translateY(60px) rotate(-18deg);width:30px}
      100%{opacity:0}
    }
    @keyframes floatUp{
      from{opacity:0;transform:translateY(24px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes goldPulse{
      0%,100%{stroke-opacity:.05}
      50%{stroke-opacity:.25}
    }

    /* ══ BACKGROUND LAYERS ══ */
    .bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:linear-gradient(160deg,#040d1c 0%,#060c18 50%,#020810 100%)}

    /* Aurora blobs - pure CSS */
    .blob{position:absolute;border-radius:50%;filter:blur(90px)}
    .b1{width:75vw;height:65vw;top:-20%;left:-25%;background:radial-gradient(circle,rgba(26,90,168,.7),transparent 65%);animation:blob1 14s ease-in-out infinite}
    .b2{width:65vw;height:60vw;bottom:-15%;right:-20%;background:radial-gradient(circle,rgba(90,171,220,.6),transparent 65%);animation:blob2 17s ease-in-out infinite}
    .b3{width:55vw;height:50vw;top:35%;left:20%;background:radial-gradient(circle,rgba(120,70,10,.5),transparent 65%);animation:blob3 11s ease-in-out infinite}
    .b4{width:45vw;height:45vw;top:10%;right:5%;background:radial-gradient(circle,rgba(10,30,80,.8),transparent 65%);animation:blob4 20s ease-in-out infinite}

    /* Shooting stars - pure CSS */
    .s1{position:absolute;height:1.5px;background:linear-gradient(90deg,transparent,#9dd0f0,transparent);top:12%;left:10%;animation:shoot 5s 1s ease-in infinite;border-radius:999px}
    .s2{position:absolute;height:1px;background:linear-gradient(90deg,transparent,#e8b84b,transparent);top:25%;left:30%;animation:shoot2 7s 3.5s ease-in infinite;border-radius:999px}
    .s3{position:absolute;height:1.5px;background:linear-gradient(90deg,transparent,#9dd0f0,transparent);top:8%;left:50%;animation:shoot 9s 6s ease-in infinite;border-radius:999px}
    .s4{position:absolute;height:1px;background:linear-gradient(90deg,transparent,#e8b84b,transparent);top:18%;left:5%;animation:shoot2 6s 2s ease-in infinite;border-radius:999px}

    /* Stars container */
    .stars{position:absolute;inset:0}

    /* Particles container */
    .ptcl{position:absolute;inset:0;overflow:hidden}

    /* Kintsugi SVG */
    .ksvg{position:absolute;inset:0;width:100%;height:100%}

    /* ══ PAGE ══ */
    .page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:48px 20px 64px}

    .logo-wrap{
      width:190px;height:190px;border-radius:50%;
      box-shadow:0 0 0 2px rgba(200,146,42,.75),0 0 0 6px rgba(200,146,42,.13),0 0 60px rgba(90,171,220,.35),0 20px 60px rgba(0,0,0,.7);
      overflow:hidden;animation:floatUp .8s ease both;position:relative;
    }
    .logo-wrap img{width:100%;height:100%;object-fit:cover;object-position:center 20%;filter:brightness(1.25) contrast(1.1) saturate(1.2)}

    .name-ar{margin-top:22px;font-weight:700;font-size:2rem;background:linear-gradient(135deg,#e8b84b,#c8922a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:floatUp .9s .1s ease both}
    .name-en{font-family:'Cinzel',serif;font-size:.88rem;letter-spacing:.35em;color:#9dd0f0;margin-top:5px;opacity:.75;animation:floatUp .9s .2s ease both}
    .divider{width:200px;height:1px;margin:24px auto;background:linear-gradient(90deg,transparent,#c8922a,#5aabdc,transparent);opacity:.6;animation:floatUp .9s .25s ease both}
    .section-label{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.28em;color:#c8922a;opacity:.7;margin:4px 0 18px;animation:floatUp .9s .3s ease both}

    .links{width:100%;max-width:370px;display:flex;flex-direction:column;gap:11px}
    .link-btn{
      display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:16px;
      text-decoration:none;position:relative;overflow:hidden;
      transition:transform .22s,box-shadow .22s;
      -webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
      border:1px solid rgba(90,171,220,.18);
      background:linear-gradient(135deg,rgba(13,21,37,.85),rgba(8,18,32,.9));
      box-shadow:0 4px 24px rgba(0,0,0,.45),inset 0 1px 0 rgba(90,171,220,.08);
    }
    .link-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(200,146,42,.07),rgba(90,171,220,.1));opacity:0;transition:opacity .3s}
    .link-btn:hover{transform:translateY(-3px) scale(1.015);box-shadow:0 10px 36px rgba(0,0,0,.5),0 0 22px rgba(90,171,220,.15);border-color:rgba(200,146,42,.4)}
    .link-btn:hover::before{opacity:1}
    .link-btn:active{transform:scale(.97)}

    .icon-wrap{width:46px;height:46px;flex-shrink:0;border-radius:13px;display:flex;align-items:center;justify-content:center;position:relative;z-index:1}
    .icon-wrap svg{width:23px;height:23px}
    .btn-text{position:relative;z-index:1}
    .btn-title{font-weight:700;font-size:.95rem;color:#d8e8f4}
    .btn-sub{font-size:.73rem;color:#6a8aaa;margin-top:2px;direction:ltr}

    .btn-phone .icon-wrap{background:linear-gradient(135deg,#25a244,#128c3e)}
    .btn-ig    .icon-wrap{background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af)}
    .btn-tt    .icon-wrap{background:linear-gradient(135deg,#111,#2dd4bf)}
    .btn-tw    .icon-wrap{background:linear-gradient(135deg,#111827,#1d4ed8)}
    .btn-fb    .icon-wrap{background:linear-gradient(135deg,#1877f2,#0a4fa0)}

    .links .link-btn:nth-child(1){animation:floatUp .9s .35s ease both}
    .links .link-btn:nth-child(2){animation:floatUp .9s .43s ease both}
    .links .link-btn:nth-child(3){animation:floatUp .9s .51s ease both}
    .links .link-btn:nth-child(4){animation:floatUp .9s .59s ease both}
    .links .link-btn:nth-child(5){animation:floatUp .9s .67s ease both}

    .gems{display:flex;gap:10px;margin:32px 0 0;animation:floatUp 1s .55s ease both}
    .gem{border-radius:50%;opacity:.7}
    .gem:nth-child(1){width:10px;height:10px;background:#5aabdc;box-shadow:0 0 10px #1e6fa8}
    .gem:nth-child(2){width:7px;height:7px;background:#c8922a;box-shadow:0 0 8px #c8922a;margin-top:3px}
    .gem:nth-child(3){width:13px;height:13px;background:#9dd0f0;box-shadow:0 0 10px #5aabdc}
    .gem:nth-child(4){width:6px;height:6px;background:#e8b84b;margin-top:6px}
    .gem:nth-child(5){width:9px;height:9px;background:#5aabdc;box-shadow:0 0 8px #1e6fa8}

    .footer{margin-top:38px;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.22em;color:#6a8aaa;opacity:.4;animation:floatUp 1s .65s ease both}
  </style>
</head>
